use_default_settings: true

general:
  instance_name: "Eterna AI Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

server:
  # secret_key is overridden by SEARXNG_SECRET env var via Docker
  secret_key: "change-me-set-via-env"
  limiter: false
  image_proxy: true
  http_protocol_version: "1.1"
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: auto

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json

# Outgoing requests — bump pool for high-concurrency monitoring scans
outgoing:
  request_timeout: 6.0
  max_request_timeout: 12.0
  pool_connections: 200
  pool_maxsize: 50
  enable_http2: true

# Redis (shared with the app stack) used by limiter / caching.
redis:
  url: redis://redis:6379/0

# Engines we actively need for Eterna monitoring.
# Everything else inherits from default settings.
engines:
  - name: google
    disabled: false
  - name: google news
    disabled: false
  - name: google images
    disabled: false
  - name: google videos
    disabled: false
  - name: bing
    disabled: false
  - name: bing news
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false
  - name: brave.news
    disabled: false
  - name: youtube
    disabled: false
  - name: reddit
    disabled: false
  - name: wikipedia
    disabled: false
  - name: qwant
    disabled: false
